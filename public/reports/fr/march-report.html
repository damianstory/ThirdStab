<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapport de mars 2026 | Industry Immersion Series</title>
    <meta name="description" content="Rapport pour le partenaire H&R Block Canada — Défi Comprendre l'impôt">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        @font-face {
            font-family: 'Graphik';
            src: url('/fonts/graphik/GraphikRegular.woff2') format('woff2'),
                 url('/fonts/graphik/GraphikRegular.otf') format('opentype');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Graphik';
            src: url('/fonts/graphik/GraphikBold.woff2') format('woff2'),
                 url('/fonts/graphik/GraphikBold.otf') format('opentype');
            font-weight: 700; font-style: normal; font-display: swap;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Graphik', Arial, sans-serif;
            background: #f1f2f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #231f20;
        }
        .container {
            background: white;
            border-radius: 4px;
            padding: 3rem;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border-top: 6px solid #14aa40;
        }
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            display: block;
        }
        h1 {
            color: #005d1f;
            font-size: 1.75rem;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            color: #6e6e6e;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }
        .badge {
            display: inline-block;
            background: #f1f2f2;
            color: #005d1f;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1.5rem;
        }
        .cta { margin-top: 2rem; }
        .cta a {
            display: inline-block;
            background: #f5cc02;
            color: #231f20;
            padding: 0.875rem 1.75rem;
            border-radius: 2px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            font-family: 'Graphik', Arial, sans-serif;
        }
        .cta a:hover {
            background: #14aa40;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/hrblock-logo-square.png" alt="H&R Block Canada" class="logo">
        <span class="badge">Mars 2026 · H&amp;R Block Canada</span>
        <h1>Rapport en cours de traduction</h1>
        <p>Le rapport de mars pour le Défi Comprendre l'impôt en partenariat avec H&amp;R Block Canada est actuellement en cours de traduction en français. Veuillez consulter la version anglaise pour le moment.</p>
        <div class="cta">
            <a href="/march/report">Voir le rapport en anglais</a>
        </div>
    </div>
</body>
</html>
